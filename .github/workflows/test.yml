name: TaskFlow Automation Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          cd backend
          sed -i '/pywin32/d' requirements.txt || true
          pip install -r requirements.txt

      - name: Start Backend Server
        run: |
          cd backend
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API Tests
        run: |
          mkdir -p reports
          newman run test/postman/TaskFlow_API_Collection.json \
            -e test/postman/TaskFlow_CI_Environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/api-test-report.html

      - name: Upload API Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/api-test-report.html

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔥 TAMBAHKAN: Setup Python dan Backend Server
      - name: Setup Python for Backend
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          cd backend
          sed -i '/pywin32/d' requirements.txt || true
          pip install -r requirements.txt

      - name: Start Backend Server
        run: |
          cd backend
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          # Tunggu backend siap
          sleep 10
          # Health check untuk memastikan backend benar-benar siap
          for i in {1..10}; do
            if curl -s http://127.0.0.1:8000/docs > /dev/null; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "⏳ Waiting for backend... ($i/10)"
            sleep 2
          done

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Start PHP Server
        run: |
          cd frontend
          php -S 127.0.0.1:8080 &
          sleep 5
          # Health check untuk frontend
          curl -s http://127.0.0.1:8080 > /dev/null && echo "✅ Frontend is ready!"

      - name: Setup Python for Selenium
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Selenium Dependencies
        run: |
          pip install selenium pytest pytest-html webdriver-manager requests

      - name: Run Selenium Tests
        env:
          HEADLESS: "true"
          BACKEND_URL: "http://127.0.0.1:8000"  # 🔥 Tambahkan environment variable
          FRONTEND_URL: "http://127.0.0.1:8080" # 🔥 Tambahkan environment variable
        run: |
          mkdir -p reports/screenshots
          cd test/selenium
          pytest test_frontend.py -v \
            --html=../../reports/frontend-test-report.html \
            --self-contained-html

      - name: Upload Selenium Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-report
          path: reports/frontend-test-report.html

      - name: Upload Screenshots (if failures)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: selenium-screenshots
          path: reports/screenshots/